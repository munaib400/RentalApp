name: Build & Test Workflow

on: [pull_request]

jobs:
    build:
        runs-on: ubuntu-latest

        services:
          postgres:
            image: postgres:16
            env:
              POSTGRES_USER: app_user
              POSTGRES_PASSWORD: app_password
              POSTGRES_DB: appdb
            options: >-
              --health-cmd pg_isready
              --health-interval 10s
              --health-timeout 5s
              --health-retries 5
            ports:
              - 5432:5432

        steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Setup .NET
          uses: actions/setup-dotnet@v4
          with:
            dotnet-version: 10.0

        - name: Restore dependencies
          run: dotnet restore ./StarterApp.sln

        - name: Build project
          run: dotnet build ./StarterApp.Database/StarterApp.Database.csproj --framework net10.0

        - name: Run tests
          run: dotnet test ./StarterApp.Test/StarterApp.Test.csproj --framework net10.0
